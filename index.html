         * РќРѕСЂРјР°Р»РёР·Р°С†РёСЏ URL РґР»СЏ РЅР°РґРµР¶РЅРѕРіРѕ СЃСЂР°РІРЅРµРЅРёСЏ
         */
        function normalizeUrl(url) {
            if (!url) return '';
            return url
                .replace(/^url\(["']?/, '')
                .replace(/["']?\)$/, '')
                .trim();
        }

        /**
         * РџСЂРѕРІРµСЂРєР° РІР°Р»РёРґРЅРѕСЃС‚Рё URL
         */
        function isValidUrl(url) {
            try {
                new URL(url);
                return true;
            } catch {
                return false;
            }
        }

        /**
         * РџРѕРєР°Р· СѓРІРµРґРѕРјР»РµРЅРёСЏ
         */
        function showToast(message, type = 'info', duration = 3000) {
            const toast = elements.toast;
            const icons = {
                success: '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>',
                error: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>',
                info: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>'
            };

            toast.innerHTML = `${icons[type] || icons.info}<span>${message}</span>`;
            toast.className = `toast ${type} visible`;

            setTimeout(() => {
                toast.classList.remove('visible');
            }, duration);
        }

        /**
         * РЎРѕС…СЂР°РЅРµРЅРёРµ СЃРѕСЃС‚РѕСЏРЅРёСЏ РІ localStorage
         */
        function saveState() {
            try {
                const dataToSave = {
                    panelTextures: state.panelTextures,
                    timestamp: Date.now()
                };
                localStorage.setItem('dr-visualizer-state', JSON.stringify(dataToSave));
            } catch (e) {
                console.warn('РќРµ СѓРґР°Р»РѕСЃСЊ СЃРѕС…СЂР°РЅРёС‚СЊ СЃРѕСЃС‚РѕСЏРЅРёРµ:', e);
            }
        }

        /**
         * Р—Р°РіСЂСѓР·РєР° СЃРѕСЃС‚РѕСЏРЅРёСЏ РёР· localStorage
         */
        function loadState() {
            try {
                const saved = localStorage.getItem('dr-visualizer-state');
                if (saved) {
                    const data = JSON.parse(saved);
                    // РџСЂРѕРІРµСЂСЏРµРј Р°РєС‚СѓР°Р»СЊРЅРѕСЃС‚СЊ (РЅРµ СЃС‚Р°СЂС€Рµ 7 РґРЅРµР№)
                    const isExpired = Date.now() - data.timestamp > 7 * 24 * 60 * 60 * 1000;
                    if (!isExpired && data.panelTextures) {
                        state.panelTextures = data.panelTextures;
                        return true;
                    }
                }
            } catch (e) {
                console.warn('РќРµ СѓРґР°Р»РѕСЃСЊ Р·Р°РіСЂСѓР·РёС‚СЊ СЃРѕСЃС‚РѕСЏРЅРёРµ:', e);
            }
            return false;
        }

        /**
         * РћС‡РёСЃС‚РєР° СЃРѕСЃС‚РѕСЏРЅРёСЏ
         */
        function clearState() {
            state.panelTextures = {
                panelLeft: null,
                panelCenter: null,
                panelRight: null
            };
            localStorage.removeItem('dr-visualizer-state');
        }

        // ======== РџР Р•Р”Р—РђР“Р РЈР—РљРђ РР—РћР‘Р РђР–Р•РќРР™ ========
        
        /**
         * РџСЂРµРґР·Р°РіСЂСѓР·РєР° РёР·РѕР±СЂР°Р¶РµРЅРёСЏ
         */
        function preloadImage(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(url);
                img.onerror = () => reject(url);
                img.src = url;
            });
        }

        /**
         * РњР°СЃСЃРѕРІР°СЏ РїСЂРµРґР·Р°РіСЂСѓР·РєР° СЃ РѕРіСЂР°РЅРёС‡РµРЅРёРµРј РїР°СЂР°Р»Р»РµР»СЊРЅРѕСЃС‚Рё
         */
        async function preloadImages(urls, limit = 3) {
            const results = { success: [], error: [] };
            
            async function processBatch(batch) {
                await Promise.allSettled(
                    batch.map(url => 
                        preloadImage(url)
                            .then(() => results.success.push(url))
                            .catch(() => results.error.push(url))
                    )
                );
            }

            const batches = [];
            for (let i = 0; i < urls.length; i += limit) {
                batches.push(urls.slice(i, i + limit));
            }

            for (const batch of batches) {
                await processBatch(batch);
            }

            return results;
        }

        // ======== Р“Р•РќР•Р РђР¦РРЇ РњР•РќР® ========
        
        function generateCategories() {
            elements.menuTypes.innerHTML = '';
            
            // РџРѕР»СѓС‡Р°РµРј РїРѕРґРєР°С‚РµРіРѕСЂРёРё РёР· Р‘Р°РјР±СѓРєРѕРІС‹Рµ РїР°РЅРµР»Рё
            const bambooData = materialsConfig["Р‘Р°РјР±СѓРєРѕРІС‹Рµ РїР°РЅРµР»Рё"];
            if (!bambooData || !bambooData.categories) return;
            
            Object.keys(bambooData.categories).forEach(subcategory => {
                const btn = document.createElement('button');
                btn.className = 'menu__type-btn';
                btn.textContent = subcategory;
                btn.dataset.category = subcategory;
                btn.setAttribute('role', 'listitem');
                elements.menuTypes.appendChild(btn);
            });
        }

        function generateTextures(subcategory) {
            elements.menuTextures.innerHTML = '';
            const textures = materialsConfig["Р‘Р°РјР±СѓРєРѕРІС‹Рµ РїР°РЅРµР»Рё"]?.categories?.[subcategory] || [];
            
            if (textures.length === 0) {
                elements.menuTextures.innerHTML = '<p style="padding: 20px; text-align: center; color: #999;">РќРµС‚ РґРѕСЃС‚СѓРїРЅС‹С… С‚РµРєСЃС‚СѓСЂ</p>';
                return;
            }

            textures.forEach(texture => {
                const btn = document.createElement('div');
                btn.className = 'texture-btn';
                btn.style.backgroundImage = `url("${texture.url}")`;
                btn.dataset.textureUrl = texture.url;
                btn.innerHTML = `<span>${texture.name}</span>`;
                btn.setAttribute('role', 'listitem');
                btn.setAttribute('tabindex', '0');
                
                // РћР±СЂР°Р±РѕС‚РєР° Р·Р°РіСЂСѓР·РєРё РёР·РѕР±СЂР°Р¶РµРЅРёСЏ
                const img = new Image();
                img.onload = () => btn.classList.add('loaded');
                img.onerror = () => {
                    btn.classList.add('error', 'loaded');
                    btn.querySelector('span').textContent = 'РћС€РёР±РєР° Р·Р°РіСЂСѓР·РєРё';
                };
                img.src = texture.url;

                elements.menuTextures.appendChild(btn);
            });
        }

        // ======== РћР‘Р РђР‘РћРўР§РРљР РЎРћР‘Р«РўРР™ ========
        
        function setupEventListeners() {
            // РљРЅРѕРїРєР° РІС‹Р±РѕСЂР° РїР°РЅРµР»Рё (РѕРґРЅР° РѕР±С‰Р°СЏ)
            document.getElementById('selectPanelBtn').addEventListener('click', () => {
                if (!state.selectedPanel) {
                    state.selectedPanel = 'panelCenter';
                    updatePanelSelection();
                    showToast('Р’С‹Р±СЂР°РЅР° С†РµРЅС‚СЂР°Р»СЊРЅР°СЏ РїР°РЅРµР»СЊ', 'info', 1500);
                }
                openMenu(state.selectedPanel);
            });

            // РљР»РёРє РїРѕ РїР°РЅРµР»Рё
            Object.entries(elements.panels).forEach(([panelId, panel]) => {
                panel.addEventListener('click', () => {
                    state.selectedPanel = panelId;
                    updatePanelSelection();
                    showToast(`Р’С‹Р±СЂР°РЅР° ${getPanelName(panelId)}`, 'info', 1500);
                });

                // РљР»Р°РІРёР°С‚СѓСЂР°
                panel.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        state.selectedPanel = panelId;
                        updatePanelSelection();
                        openMenu(panelId);
                    }
                });
            });

            // Р—Р°РєСЂС‹С‚РёРµ РјРµРЅСЋ
            elements.menuClose.addEventListener('click', closeMenu);
            elements.menuOverlay.addEventListener('click', closeMenu);
            
            // Р—Р°РєСЂС‹С‚РёРµ РїРѕ ESC
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && elements.menu.classList.contains('active')) {
                    closeMenu();
                }
            });
            
            // РќР°Р·Р°Рґ Рє РєР°С‚РµРіРѕСЂРёСЏРј
            elements.menuBack.addEventListener('click', showCategories);
            elements.menuBack.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    showCategories();
                }
            });

            // Р’С‹Р±РѕСЂ РєР°С‚РµРіРѕСЂРёРё
            elements.menuTypes.addEventListener('click', (e) => {
                const btn = e.target.closest('.menu__type-btn');
                if (btn) {
                    const category = btn.dataset.category;
                    selectCategory(category);
                }
            });

            // Р’С‹Р±РѕСЂ С‚РµРєСЃС‚СѓСЂС‹
            elements.menuTextures.addEventListener('click', (e) => {
                const textureBtn = e.target.closest('.texture-btn');
                if (textureBtn && !textureBtn.classList.contains('error')) {
                    selectTexture(textureBtn);
                }
            });

            // РљРЅРѕРїРєР° СЃР±СЂРѕСЃР°
            elements.resetBtn.addEventListener('click', resetAllTextures);
        }

        // ======== Р¤РЈРќРљР¦РР РњР•РќР® ========
        
        function openMenu(panel) {
            state.currentPanel = panel;
            if (!state.selectedPanel) {
                state.selectedPanel = panel;
            }
            
            elements.menu.classList.add('active');
            elements.menuOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // РЎР±СЂРѕСЃ СЃРѕСЃС‚РѕСЏРЅРёСЏ РјРµРЅСЋ
            showCategories();
            updatePanelSelection();
        }

        function closeMenu() {
            elements.menu.classList.remove('active');
            elements.menuOverlay.classList.remove('active');
            document.body.style.overflow = '';
            
            // РЈР±РёСЂР°РµРј РїСѓР»СЊСЃР°С†РёСЋ СЃ РєРЅРѕРїРєРё РїРѕСЃР»Рµ РїРµСЂРІРѕРіРѕ РІС‹Р±РѕСЂР°
            const selectBtn = document.getElementById('selectPanelBtn');
            if (selectBtn) {
                selectBtn.classList.remove('pulse');
            }
        }

        function showCategories() {
            elements.menuTitle.textContent = 'Р’С‹Р±РµСЂРёС‚Рµ РјР°С‚РµСЂРёР°Р»:';
            elements.menuTitle.style.display = 'block';
            elements.menuBack.style.display = 'none';
            elements.menuTypes.style.display = 'flex';
            elements.menuTextures.classList.remove('active');
            checkSelectedTexture();
        }

        function selectCategory(subcategory) {
            elements.menuTitle.textContent = subcategory;
            elements.menuBack.style.display = 'block';
            elements.menuTypes.style.display = 'none';
            
            generateTextures(subcategory);
            elements.menuTextures.classList.add('active');
            checkSelectedTexture();
        }

        function selectTexture(textureBtn) {
            const textureUrl = textureBtn.dataset.textureUrl;
            
            if (!state.selectedPanel) {
                state.selectedPanel = state.currentPanel || 'panelCenter';
            }

            // РџСЂРёРјРµРЅСЏРµРј С‚РµРєСЃС‚СѓСЂСѓ
            const panel = elements.panels[state.selectedPanel];
            if (panel) {
                panel.style.backgroundImage = `url("${textureUrl}")`;
                state.panelTextures[state.selectedPanel] = textureUrl;
                saveState();
                
                // РћР±РЅРѕРІР»СЏРµРј Р°РєС‚РёРІРЅРѕРµ СЃРѕСЃС‚РѕСЏРЅРёРµ
                document.querySelectorAll('.texture-btn').forEach(btn => btn.classList.remove('active'));
                textureBtn.classList.add('active');

                showToast('РўРµРєСЃС‚СѓСЂР° РїСЂРёРјРµРЅРµРЅР°', 'success', 1500);

                // Р—Р°РєСЂС‹С‚СЊ РјРµРЅСЋ РЅР° РјРѕР±РёР»СЊРЅС‹С…
                if (window.innerWidth < 768) {
                    setTimeout(closeMenu, 500);
                }
            }
        }

        function checkSelectedTexture() {
            if (!state.selectedPanel) return;

            const currentTexture = state.panelTextures[state.selectedPanel];
            
            document.querySelectorAll('.texture-btn').forEach(btn => {
                const btnUrl = normalizeUrl(btn.dataset.textureUrl);
                const panelUrl = normalizeUrl(currentTexture);
                
                if (btnUrl && panelUrl && btnUrl === panelUrl) {
                    btn.classList.add('active');
                }
            });
        }

        function updatePanelSelection() {
            // РЎРЅРёРјР°РµРј РІС‹РґРµР»РµРЅРёРµ СЃРѕ РІСЃРµС… РїР°РЅРµР»РµР№
            Object.values(elements.panels).forEach(panel => {
                panel.classList.remove('selected');
            });

            // Р’С‹РґРµР»СЏРµРј РІС‹Р±СЂР°РЅРЅСѓСЋ
            if (state.selectedPanel && elements.panels[state.selectedPanel]) {
                elements.panels[state.selectedPanel].classList.add('selected');
            }
        }

        function getPanelName(panelId) {
            const names = {
                panelLeft: 'Р»РµРІР°СЏ РїР°РЅРµР»СЊ',
                panelCenter: 'С†РµРЅС‚СЂР°Р»СЊРЅР°СЏ РїР°РЅРµР»СЊ',
                panelRight: 'РїСЂР°РІР°СЏ РїР°РЅРµР»СЊ'
            };
            return names[panelId] || panelId;
        }

        function resetAllTextures() {
            if (!confirm('РЎР±СЂРѕСЃРёС‚СЊ РІСЃРµ РїСЂРёРјРµРЅРµРЅРЅС‹Рµ С‚РµРєСЃС‚СѓСЂС‹?')) return;

            // Р Р°Р·РЅС‹Рµ С‚РµРєСЃС‚СѓСЂС‹ РёР· СЂР°Р·РЅС‹С… СЃРµСЂРёР№ РїРѕ СѓРјРѕР»С‡Р°РЅРёСЋ
            elements.panelLeft.style.backgroundImage = "url('https://static.tildacdn.com/stor6165-6666-4832-b761-306361343461/29442684.png')"; // CРµСЂРёСЏ РјРµС‚Р°Р» - РЎР°С‚РёРЅ #1
            elements.panelCenter.style.backgroundImage = "url('https://static.tildacdn.com/stor3130-6434-4062-b434-333832613539/71831414.png')"; // CРµСЂРёСЏ РјСЂР°РјРѕСЂ - Р‘РµР»С‹Р№ РјСЂР°РјРѕСЂ
            elements.panelRight.style.backgroundImage = "url('https://static.tildacdn.com/stor6237-3734-4430-b831-353034633331/37793786.png')"; // CРµСЂРёСЏ Р±Р»РµСЃРє РєСЂРёСЃС‚Р°Р»Р° - РљРѕС„Рµ СЃ РјРѕР»РѕРєРѕРј

            clearState();
            showToast('Р’СЃРµ С‚РµРєСЃС‚СѓСЂС‹ СЃР±СЂРѕС€РµРЅС‹', 'info', 2000);
        }

        // ======== РРќРР¦РРђР›РР—РђР¦РРЇ ========
        
        async function init() {
            try {
                // Р—Р°РіСЂСѓР¶Р°РµРј СЃРѕС…СЂР°РЅРµРЅРЅРѕРµ СЃРѕСЃС‚РѕСЏРЅРёРµ
                const hasState = loadState();
                
                // РџСЂРёРјРµРЅСЏРµРј СЃРѕС…СЂР°РЅРµРЅРЅС‹Рµ С‚РµРєСЃС‚СѓСЂС‹
                if (hasState) {
                    Object.entries(state.panelTextures).forEach(([panelId, textureUrl]) => {
                        if (textureUrl && elements.panels[panelId]) {
                            elements.panels[panelId].style.backgroundImage = `url("${textureUrl}")`;
                        }
                    });
                } else {
                    // РЈСЃС‚Р°РЅР°РІР»РёРІР°РµРј СЂР°Р·РЅС‹Рµ С‚РµРєСЃС‚СѓСЂС‹ РїРѕ СѓРјРѕР»С‡Р°РЅРёСЋ РїСЂРё РїРµСЂРІРѕР№ Р·Р°РіСЂСѓР·РєРµ
                    elements.panelLeft.style.backgroundImage = "url('https://static.tildacdn.com/stor6165-6666-4832-b761-306361343461/29442684.png')"; // CРµСЂРёСЏ РјРµС‚Р°Р» - РЎР°С‚РёРЅ #1
                    elements.panelCenter.style.backgroundImage = "url('https://static.tildacdn.com/stor3130-6434-4062-b434-333832613539/71831414.png')"; // CРµСЂРёСЏ РјСЂР°РјРѕСЂ - Р‘РµР»С‹Р№ РјСЂР°РјРѕСЂ
                    elements.panelRight.style.backgroundImage = "url('https://static.tildacdn.com/stor6237-3734-4430-b831-353034633331/37793786.png')"; // CРµСЂРёСЏ Р±Р»РµСЃРє РєСЂРёСЃС‚Р°Р»Р° - РљРѕС„Рµ СЃ РјРѕР»РѕРєРѕРј
                }

                // Р“РµРЅРµСЂРёСЂСѓРµРј РєР°С‚РµРіРѕСЂРёРё
                generateCategories();

                // РќР°СЃС‚СЂР°РёРІР°РµРј РѕР±СЂР°Р±РѕС‚С‡РёРєРё
                setupEventListeners();

                // РџСЂРµРґР·Р°РіСЂСѓР¶Р°РµРј РЅРµСЃРєРѕР»СЊРєРѕ РїРµСЂРІС‹С… С‚РµРєСЃС‚СѓСЂ РґР»СЏ Р±С‹СЃС‚СЂРѕРґРµР№СЃС‚РІРёСЏ
                const firstTextures = Object.values(materialsConfig["Р‘Р°РјР±СѓРєРѕРІС‹Рµ РїР°РЅРµР»Рё"]?.categories || {})
                    .flat()
                    .slice(0, 6)
                    .map(t => t.url);
                
                // РџСЂРµРґР·Р°РіСЂСѓР·РєР° РІ С„РѕРЅРµ
                preloadImages(firstTextures, 2).catch(console.warn);

                // РЎРєСЂС‹РІР°РµРј РїСЂРµР»РѕР°РґРµСЂ
                setTimeout(() => {
                    elements.preloader.classList.add('hidden');
                    state.isLoading = false;
                }, 1000);

                console.log('вњ… Р’РёР·СѓР°Р»РёР·Р°С‚РѕСЂ РёРЅРёС†РёР°Р»РёР·РёСЂРѕРІР°РЅ');
            } catch (error) {
                console.error('вќЊ РћС€РёР±РєР° РёРЅРёС†РёР°Р»РёР·Р°С†РёРё:', error);
                elements.preloader.querySelector('.preloader__text').textContent = 'РћС€РёР±РєР° Р·Р°РіСЂСѓР·РєРё';
                showToast('РћС€РёР±РєР° Р·Р°РіСЂСѓР·РєРё РІРёР·СѓР°Р»РёР·Р°С‚РѕСЂР°', 'error', 5000);
            }
        }

        // Р—Р°РїСѓСЃРє РїРѕСЃР»Рµ Р·Р°РіСЂСѓР·РєРё DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // РћР±СЂР°Р±РѕС‚РєР° РёР·РјРµРЅРµРЅРёСЏ СЂР°Р·РјРµСЂР° РѕРєРЅР°
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (state.selectedPanel) {
                    updatePanelSelection();
                }
            }, 250);
        });
    </script>
